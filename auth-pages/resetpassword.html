<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css">
    <link rel="stylesheet" href="../style.css">
    <title>Create New Password</title>
</head>

<body>

    <div class="auth-container">
        <h2 style="text-align: center; margin-bottom: 10px;">New Password</h2>
        <p style="color: var(--text-muted); text-align: center; font-size: 14px; margin-bottom: 24px;">Please enter your
            secure new password.</p>

        <form id="resetPassForm" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="input-group">
                <label for="newPassword">New Password</label>
                <input type="password" placeholder="Min. 6 characters" id="newPassword">
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" placeholder="Repeat your password" id="confirmPassword">
            </div>

            <button type="submit" class="submit-btn">Update Password ✨</button>
        </form>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>
    <script type="module" src="reset-password.js"></script>
</body>

</html>
