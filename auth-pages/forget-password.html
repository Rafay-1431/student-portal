<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css">
    <link rel="stylesheet" href="../style.css"> <title>Forget Password</title>
</head>
<body>

    <div class="auth-container">
        <h2 style="text-align: center; margin-bottom: 10px;">reset Password</h2>
        <p style="color: var(--text-muted); text-align: center; font-size: 14px; margin-bottom: 24px;">Enter your email to get a reset link.</p>

        <form id="forgetForm" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" placeholder="name@example.com" id="email" required>
            </div>
            <button type="submit" class="submit-btn">Send Reset Link →</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="../index.html" style="color: var(--text-muted); font-size: 14px; text-decoration: none;" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='var(--text-muted)'">← Back to Login</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>
    <script type="module" src="/auth-pages/forget-password.js"></script>
</body>
</html>
